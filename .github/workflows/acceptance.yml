name: Acceptance Validation (Windows)

on:
  pull_request:
    branches: [ acceptance ]
  push:
    branches: [ acceptance ]

jobs:
  acceptance-windows:
    name: Acceptance Simulation (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Compile Java source and tests (Windows)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path out -Force | Out-Null
          New-Item -ItemType Directory -Path out-app -Force | Out-Null
          $cwd = (Get-Location).Path + '\'
          $srcFiles = Get-ChildItem -Path src -Filter *.java -Recurse | ForEach-Object { $_.FullName.Replace($cwd, '') }
          $testFiles = Get-ChildItem -Path test -Filter *.java -Recurse | ForEach-Object { $_.FullName.Replace($cwd, '') }
          $srcFiles | Out-File -FilePath sources.txt -Encoding ascii
          $testFiles | Out-File -FilePath tests.txt -Encoding ascii
          javac -d out @sources.txt @tests.txt
          javac -d out-app @sources.txt

      - name: Run tests (Windows)
        shell: pwsh
        run: |
          java -cp out AllTests

      - name: Build executable JAR (Windows)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          jar cfe release/JabberPoint.jar JabberPoint -C out-app .

      - name: Upload Windows acceptance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-windows-artifacts
          path: |
            release/JabberPoint.jar

